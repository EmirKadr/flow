<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Användare - Bemanning</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="with-sidebar">
  <header class="topbar"></header>

  <section class="controls">
    <button class="primary" id="new-user">+ Ny användare</button>
    <button id="download-user-template" hidden>Ladda ner importmall</button>
    <button id="import-users" hidden>Importera Excel</button>
    <input id="user-import-file" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden />
    <label class="controls-checkbox">Lås bemanningsceller som andra användare har fyllt i <input type="checkbox" id="lock-foreign-schedule-cells" /></label>
  </section>

  <main>
    <div class="section-title section-title-with-action">
      <span>Användare</span>
      <label class="table-checkbox-label"><input type="checkbox" id="show-inactive" /> Visa inaktiva</label>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Användarnamn</th>
            <th>Visningsnamn</th>
            <th>Roll</th>
            <th>Avdelning</th>
            <th>Aktiv</th>
            <th>Lösenord</th>
            <th>Skapad</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/users.js"></script>
</body>
</html>
