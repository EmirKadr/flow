<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produktivitet - Bemanning</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="with-sidebar">
  <header class="topbar"></header>

  <section class="controls">
    <button id="productivityUploadBtn" type="button">Välj CSV-filer</button>
    <input id="productivityUploadInput" type="file" accept=".csv,.txt" multiple hidden />
    <label>Datum
      <input id="productivityDate" type="date" />
    </label>
    <label>Block
      <select id="productivityGroupFilter">
        <option value="all">Alla</option>
      </select>
    </label>
    <label>Sök
      <input id="productivitySearch" type="search" autocomplete="off" />
    </label>
  </section>

  <main class="productivity-page">
    <div class="section-title">Produktivitet</div>
    <div id="productivityStatus" class="productivity-status"></div>
    <section id="productivityUploadPanel" class="productivity-upload-panel">
      <div class="productivity-upload-head">
        <h3>Underlag</h3>
        <span id="productivityUploadCount"></span>
      </div>
      <div id="productivityFileSlots" class="productivity-file-slots"></div>
      <div id="productivityUploadStatus" class="productivity-upload-status"></div>
    </section>
    <div id="productivitySummary" class="productivity-summary"></div>
    <div id="productivitySources" class="productivity-sources"></div>
    <div id="productivityContent" class="productivity-content"></div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/productivity.js"></script>
</body>
</html>
