<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produktivitet - flow</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="with-sidebar">
  <header class="topbar"></header>

  <section class="controls">
    <label class="productivity-date-field">Datum
      <span class="date-nav productivity-date-nav">
        <button id="productivityPrevDate" class="date-nav-btn" type="button" aria-label="Föregående datum" title="Föregående datum" disabled>‹</button>
        <div class="date-display-wrap" title="Välj datum">
          <span class="date-display-text" id="productivityDateDisplayText">YYYY-MM-DD</span>
          <input id="productivityDate" type="date" class="date-display-overlay" aria-label="Välj datum" />
        </div>
        <button id="productivityNextDate" class="date-nav-btn" type="button" aria-label="Nästa datum" title="Nästa datum" disabled>›</button>
      </span>
    </label>
    <label>Sök
      <input id="productivitySearch" type="search" autocomplete="off" />
    </label>
  </section>

  <main class="productivity-page">
    <div class="section-title">Produktivitet</div>
    <div id="productivityStatus" class="productivity-status"></div>
    <div id="productivityFileRequirements"></div>
    <div id="productivitySummary" class="productivity-summary"></div>
    <div id="productivitySources" class="productivity-sources"></div>
    <div id="productivityContent" class="productivity-content"></div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/productivity_uploads.js"></script>
  <script src="/js/productivity.js"></script>
</body>
</html>
