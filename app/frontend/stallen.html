<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ställen – Bemanning</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="with-sidebar">
  <header class="topbar"></header>

  <section class="controls">
    <button class="primary" id="new-act">+ Ny aktivitet</button>
  </section>

  <main>
    <div class="section-title section-title-with-action">
      <span>Ställen / aktiviteter</span>
      <label class="table-checkbox-label"><input type="checkbox" id="show-inactive" /> Visa inaktiva</label>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Färg</th>
            <th>Etikett</th>
            <th id="code-column-header" hidden>Kod</th>
            <th>Område</th>
            <th>Summeras som</th>
            <th>Kategori</th>
            <th>Sortering</th>
            <th>Aktiv</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="acts-body"></tbody>
      </table>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/activities.js"></script>
</body>
</html>
