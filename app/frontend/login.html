<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logga in - flow</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="login-box">
    <div class="login-brand">
      <img class="brand-logo" src="/flow-logo.png" alt="flow" />
      <div>
        <div class="brand-name">flow</div>
        <div class="brand-sub">Stigamo</div>
      </div>
    </div>
    <h2>Välkommen tillbaka</h2>
    <p class="subtitle">Logga in för att komma åt systemet</p>
    <form id="login-form">
      <label for="username">Användarnamn</label>
      <input id="username" name="username" autocomplete="username" required />

      <label for="password">Lösenord</label>
      <input id="password" name="password" type="password" autocomplete="current-password" />
      <p class="note">Lämna tomt om det är första inloggningen.</p>

      <button class="primary" type="submit">Logga in</button>
      <div class="err" id="err" hidden></div>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const errEl = document.getElementById("err");

    function nextPage(user) {
      return user?.must_change_password ? "/set-password.html" : "/index.html";
    }

    function clearSessionDate() {
      try { sessionStorage.removeItem("flow-selected-date"); } catch (e) {}
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.hidden = true;
      try {
        const user = await api.post("/api/auth/login", {
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        });
        clearSessionDate();
        window.location.href = nextPage(user);
      } catch (err) {
        errEl.textContent = err.message || "Inloggning misslyckades";
        errEl.hidden = false;
      }
    });

    (async () => {
      try {
        const user = await api.get("/api/auth/me");
        window.location.href = nextPage(user);
      } catch (_) { /* inte inloggad */ }
    })();
  </script>
</body>
</html>
