<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personer – Bemanning</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="topbar"></header>

  <section class="controls">
    <button class="primary" id="new-person">+ Ny person</button>
    <label><input type="checkbox" id="show-inactive" /> Visa inaktiva</label>
  </section>

  <main>
    <div class="section-title">Personregister</div>
    <div class="table-wrap">
      <table id="persons-table">
        <thead>
          <tr class="sort-row">
            <th data-sort="name">Namn <span class="sort-ind"></span></th>
            <th data-sort="home_area">Hemområde <span class="sort-ind"></span></th>
            <th data-sort="home_activity">Huvudställe <span class="sort-ind"></span></th>
            <th data-sort="is_active">Aktiv <span class="sort-ind"></span></th>
            <th data-sort="sort_order">Sortering <span class="sort-ind"></span></th>
            <th></th>
          </tr>
          <tr class="filter-row">
            <th><input data-filter="name" placeholder="Sök…" /></th>
            <th><input data-filter="home_area" placeholder="Sök…" /></th>
            <th><input data-filter="home_activity" placeholder="Sök…" /></th>
            <th><input data-filter="is_active" placeholder="ja / nej" /></th>
            <th><input data-filter="sort_order" placeholder="Sök…" /></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="persons-body"></tbody>
      </table>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/persons.js"></script>
</body>
</html>
