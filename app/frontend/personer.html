<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personer – flow</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="alternate icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="with-sidebar">
  <header class="topbar"></header>

  <section class="controls">
    <button class="primary" id="new-person">+ Ny person</button>
    <button id="bulk-persons" hidden>+ Flera nya personer</button>
    <button id="download-person-template">Ladda ner importmall</button>
    <button id="import-persons">Importera Excel</button>
    <button class="import-help-btn" id="person-import-help" type="button" title="Hjälp med import" aria-label="Hjälp med import">?</button>
    <input id="person-import-file" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden />
  </section>

  <main>
    <div class="section-title">Personregister</div>
    <div class="table-wrap">
      <table id="persons-table">
        <thead>
          <tr class="sort-row">
            <th data-sort="name">Namn <span class="sort-ind"></span></th>
            <th data-sort="noman">NoMan <span class="sort-ind"></span></th>
            <th data-sort="home_area">Hemområde <span class="sort-ind"></span></th>
            <th data-sort="home_activity">Huvudaktivitet <span class="sort-ind"></span></th>
            <th data-sort="sort_order">Sortering <span class="sort-ind"></span></th>
            <th></th>
          </tr>
          <tr class="filter-row">
            <th><input data-filter="name" placeholder="Sök…" /></th>
            <th><input data-filter="noman" placeholder="Sök…" /></th>
            <th><input data-filter="home_area" placeholder="Sök…" /></th>
            <th><input data-filter="home_activity" placeholder="Sök…" /></th>
            <th><input data-filter="sort_order" placeholder="Sök…" /></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="persons-body"></tbody>
      </table>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/persons.js"></script>
</body>
</html>
