<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Översikt – Bemanning</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    table.overview { min-width: 900px; }
    table.overview th, table.overview td {
      padding: 4px;
      font-size: 12px;
      text-align: center;
      min-width: 110px;
    }
    table.overview th { background: var(--header); position: sticky; top: 0; z-index: 2; }
    table.overview th.name,
    table.overview td.name {
      width: 190px;
      min-width: 190px;
      max-width: 190px;
    }
    table.overview td.name {
      text-align: left; padding-left: 8px;
      background: #e6e6e6;
      position: sticky; left: 0; z-index: 3;
    }
    table.overview td.day select { width: 100%; border: 0; background-color: inherit; padding: 4px; }
    table.overview td.day.mixed {
      background: repeating-linear-gradient(135deg, #fff, #fff 6px, #ddd 6px, #ddd 12px) !important;
    }
    table.overview td.day.is-off {
      background: #f0f0f0 !important;
      color: #888;
      font-style: italic;
    }
    table.overview td.day.scheduled-empty {
      background: repeating-linear-gradient(45deg, #fff8e1, #fff8e1 6px, #fff 6px, #fff 12px) !important;
    }
    .hour-info { font-size: 10px; opacity: 0.7; margin-top: 2px; }
    table.overview td.day {
      position: relative;
    }
    table.overview th[data-sort] { cursor: pointer; user-select: none; }
    table.overview th[data-sort]:hover { background: #333; }
    table.overview .sort-ind { font-size: 10px; opacity: 0.7; margin-left: 4px; }
    table.overview td.day.drag-target {
      outline: 2px solid var(--green);
      outline-offset: -2px;
    }
    table.overview td.day.focused {
      outline: 2px solid #ff7a00;
      outline-offset: -2px;
    }
    body.dragging-ov { cursor: crosshair; user-select: none; }
    body.dragging-ov select { pointer-events: none; }
  </style>
</head>
<body>
  <header class="topbar"></header>

  <section class="controls">
    <label>Vy
      <select id="viewMode">
        <option value="week">Vecka</option>
        <option value="month">Månad</option>
      </select>
    </label>
    <button id="prev">◀</button>
    <label>År <input id="yearInput" type="number" min="2000" max="2100" style="width: 80px;" /></label>
    <label class="week-only">Vecka <input id="weekInput" type="number" min="1" max="53" style="width: 60px;" /></label>
    <label class="month-only" hidden>Månad
      <select id="monthSelect">
        <option value="1">Januari</option><option value="2">Februari</option><option value="3">Mars</option>
        <option value="4">April</option><option value="5">Maj</option><option value="6">Juni</option>
        <option value="7">Juli</option><option value="8">Augusti</option><option value="9">September</option>
        <option value="10">Oktober</option><option value="11">November</option><option value="12">December</option>
      </select>
    </label>
    <button id="next">▶</button>
    <label>Område <select id="areaSelect"></select></label>
    <button id="reloadBtn">Uppdatera</button>
    <button id="undoBtn" class="icon-btn" type="button" title="Ångra (Ctrl+Z)" aria-label="Ångra" disabled>↶</button>
    <button id="redoBtn" class="icon-btn" type="button" title="Gör om (Ctrl+Y)" aria-label="Gör om" disabled>↷</button>
  </section>

  <main>
    <div class="section-title" id="sectionTitle">Översikt</div>
    <div class="table-wrap">
      <table class="overview" id="overviewTable">
        <thead><tr id="headerRow"><th class="name header-filter-cell" data-sort="name" data-filter-trigger="nameFilter" title="Klicka för att söka på person. Shift-klick sorterar."><div class="header-filter"><span class="header-filter-label">Person <span class="sort-ind"></span></span><input id="nameFilter" class="header-filter-input" aria-label="Filtrera person" autocomplete="off" /></div></th></tr></thead>
        <tbody id="overviewBody"></tbody>
      </table>
    </div>
    <p class="note">Klicka i en cell för att bemanna hela dagen enligt personens veckomall. Saknar personen mall används 07-16 (9 timmar). Ändra mall under <a href="/personer.html">Personer → Schema</a>.</p>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/overview.js"></script>
</body>
</html>
