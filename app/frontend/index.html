<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bemanning - flow</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="alternate icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="with-sidebar">
  <header class="topbar"></header>

  <section class="controls">
    <label>År
      <input id="yearInput" type="number" min="2000" max="2100" style="width: 80px;" />
    </label>
    <label>Vecka
      <input id="weekInput" type="number" min="1" max="53" style="width: 60px;" />
    </label>
    <label>Dag
      <select id="daySelect">
        <option value="1">Måndag</option>
        <option value="2">Tisdag</option>
        <option value="3">Onsdag</option>
        <option value="4">Torsdag</option>
        <option value="5">Fredag</option>
        <option value="6">Lördag</option>
        <option value="7">Söndag</option>
      </select>
    </label>
    <div class="date-nav">
      <button id="prevDayBtn" class="date-nav-btn" type="button" aria-label="Föregående dag" title="Föregående dag">‹</button>
      <div class="date-display-wrap" title="Välj datum">
        <span class="date-display-text" id="dateDisplayText">YYYY-MM-DD</span>
        <input id="dateInput" type="date" class="date-display-overlay" aria-label="Välj datum" />
      </div>
      <button id="nextDayBtn" class="date-nav-btn" type="button" aria-label="Nästa dag" title="Nästa dag">›</button>
    </div>
    <button id="copyBtn">Kopiera dag…</button>
    <button id="clearBtn" class="danger">Rensa dag</button>
    <button id="undoBtn" class="icon-btn" type="button" title="Ångra (Ctrl+Z)" aria-label="Ångra" disabled>↶</button>
    <button id="redoBtn" class="icon-btn" type="button" title="Gör om (Ctrl+Y)" aria-label="Gör om" disabled>↷</button>
    <button id="presenceBtn" type="button">Närvarande</button>
  </section>

  <main>
    <div class="section-title" id="sectionTitle">Bemanning</div>
    <div class="table-wrap">
      <table class="matrix" id="scheduleTable">
        <thead>
          <tr id="headerRow">
            <th class="name header-filter-cell" data-sort="name" data-filter-trigger="nameFilter" title="Klicka för att söka på person. Shift-klick sorterar.">
              <div class="header-filter">
                <span class="header-filter-label">Person <span class="sort-ind"></span></span>
                <input id="nameFilter" class="header-filter-input" aria-label="Filtrera person" autocomplete="off" />
              </div>
            </th>
            <th class="base" data-sort="home_area" title="Klicka för att sortera på hemområde.">Hemområde <span class="sort-ind"></span></th>
          </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
      </table>
    </div>

    <div class="summary-grid">
      <div class="card summary-card">
        <h3>Summering per aktivitet</h3>
        <table class="small-table">
          <thead>
            <tr><th>Aktivitet</th><th>Timmar</th><th>Pers.</th></tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
      <div class="card calc-card">
        <div class="calc-card-header">
          <h3>Bemanningskalkyl</h3>
        </div>
        <div id="calcPanels" class="calc-panels"></div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/presence_print.js"></script>
  <script src="/js/schedule.js"></script>
</body>
</html>
