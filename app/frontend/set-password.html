<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skapa lösenord - flow</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/app-icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="login-box">
    <div class="login-brand">
      <img class="brand-logo" src="/flow-logo.png" alt="flow" />
      <div>
        <div class="brand-name">flow</div>
        <div class="brand-sub">Stigamo</div>
      </div>
    </div>
    <h2>Skapa lösenord</h2>
    <p class="subtitle">Välj ett lösenord för ditt konto.</p>
    <form id="password-form">
      <label for="password">Nytt lösenord</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required />

      <label for="confirm-password">Bekräfta lösenord</label>
      <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" required />

      <button class="primary" type="submit">Spara lösenord</button>
      <div class="err" id="err" hidden></div>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script>
    const form = document.getElementById("password-form");
    const errEl = document.getElementById("err");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.hidden = true;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;
      if (password.length < 8) {
        errEl.textContent = "Lösenord måste vara minst 8 tecken";
        errEl.hidden = false;
        return;
      }
      if (password !== confirmPassword) {
        errEl.textContent = "Lösenorden matchar inte";
        errEl.hidden = false;
        return;
      }
      try {
        await api.post("/api/auth/set-password", { password });
        queueToast("Lösenordet är skapat", "success");
        window.location.href = "/index.html";
      } catch (err) {
        errEl.textContent = err.message || "Kunde inte spara lösenordet";
        errEl.hidden = false;
      }
    });

    (async () => {
      try {
        const user = await api.get("/api/auth/me");
        if (!user.must_change_password) window.location.href = "/index.html";
      } catch (_) {
        window.location.href = "/login.html";
      }
    })();
  </script>
</body>
</html>
