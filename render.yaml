databases:
  - name: flow-db
    plan: free
    databaseName: flow
    user: flow

services:
  - type: web
    name: flow-web
    runtime: python
    plan: starter
    rootDir: app
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: SUPER_USER_USERNAMES
        value: emikad,mikhal
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
      - key: RENDER_POSTGRES_ID
        sync: false
      - key: HEALTHCHECK_PUBLIC_URL
        sync: false
      - key: EXCEL_API_TOKEN
        generateValue: true
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_MODEL
        value: MiniMax-M2.7
      - key: DATA_SOURCE_API_BASE_URL
        sync: false
      - key: DATA_SOURCE_API_KEY
        sync: false
      - key: DATA_SOURCE_API_CLIENT
        sync: false
      - key: DATA_SOURCE_API_KEY_HEADER
        sync: false
      - key: DATA_SOURCE_API_CLIENT_HEADER
        sync: false
      - key: DATA_SOURCE_VIEW_DATA_PATH_TEMPLATE
        sync: false
      - key: DATA_SOURCE_VERIFY_SSL
        value: "true"
      - key: DATA_SOURCE_CA_BUNDLE
        sync: false
      - key: DATA_SOURCE_CATALOG_JSON
        sync: false
      - key: DATA_SOURCE_MAX_ROWS
        value: "1000"
      - key: PYTHON_VERSION
        value: 3.12.7
